<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATOSA — Technical Documentation Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 全頁背景 Aurora ── */
    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: #0d1b2e;
      color: #e8edf5;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 10% 20%, rgba(37,99,235,0.40) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(109,40,217,0.32) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 55% 5%,  rgba(14,165,233,0.22) 0%, transparent 50%);
      animation: aurora 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes aurora {
      0%   { opacity: 1;    filter: blur(38px); }
      50%  { opacity: 0.72; filter: blur(56px); }
      100% { opacity: 1;    filter: blur(38px); }
    }

    /* ── 主容器 ── */
    .container {
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    /* ── 頂部操作列 ── */
    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .topbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,23,42,0.70);
      color: #cbd5e1;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      backdrop-filter: blur(8px);
    }
    .topbar-btn:hover {
      background: rgba(37,99,235,0.25);
      border-color: rgba(59,130,246,0.45);
      color: #e2e8f0;
    }
    .topbar-btn.primary {
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 14px rgba(37,99,235,0.35);
    }
    .topbar-btn.primary:hover { opacity: 0.88; }
    #logout { color: #fca5a5; }
    #logout:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.35); color: #fca5a5; }

    /* ── 標題區 ── */
    .header-container {
      text-align: center;
      margin-bottom: 24px;
    }
    .header-container h1 {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }
    .header-container .sub {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ── 公告欄 ── */
    .announcement-bar {
      background: rgba(10,18,40,0.75);
      border: 1px solid rgba(251,191,36,0.25);
      border-left: 3px solid #f59e0b;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 20px;
      position: relative;
      backdrop-filter: blur(12px);
    }
    .announcement-bar h2 {
      font-size: 14px;
      font-weight: 700;
      color: #fbbf24;
      margin-bottom: 6px;
    }
    .announcement-content {
      font-size: 13.5px;
      line-height: 1.6;
      color: #fca5a5;
    }
    .close-btn {
      background: none; border: none;
      font-size: 18px; color: #64748b;
      position: absolute; top: 10px; right: 14px;
      cursor: pointer; transition: color 0.2s;
    }
    .close-btn:hover { color: #e2e8f0; }
    #annEditBtn {
      font-size: 12px; font-weight: 500;
      margin-left: 10px; cursor: pointer;
      color: #f59e0b; text-decoration: underline;
      background: none; border: none; font-family: inherit;
    }
    #announcementEdit {
      width: 100%; min-height: 80px;
      margin-top: 10px; padding: 10px 12px;
      background: rgba(5,12,28,0.85);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #e2e8f0; font-size: 13.5px; font-family: inherit;
      resize: vertical;
    }
    .ann-edit-btn {
      margin-top: 8px; padding: 6px 16px;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      font-weight: 600; font-family: inherit;
    }
    .ann-save   { background: linear-gradient(135deg,#059669,#10b981); color:#fff; }
    .ann-cancel { background: rgba(100,116,139,0.35); color:#94a3b8; margin-left:6px; border: 1px solid rgba(255,255,255,0.10); }

    /* ── 搜索+序號列 ── */
    .search-serial-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 18px;
      background: rgba(10,18,40,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 18px 22px;
      backdrop-filter: blur(12px);
    }
    .search-col, .serial-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .col-divider {
      width: 1px;
      background: rgba(255,255,255,0.08);
      align-self: stretch;
      margin: 0 22px;
    }
    .col-label {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 10px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    #searchInput, #serialInput {
      padding: 10px 14px;
      background: rgba(5,12,28,0.85);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput { width: 90%; }
    #serialInput { flex: 1; max-width: 300px; }
    #searchInput::placeholder, #serialInput::placeholder { color: #334155; }
    #searchInput:focus, #serialInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .serial-input-row {
      display: flex; gap: 8px; width: 100%; justify-content: center;
    }
    #checkSerialBtn {
      padding: 10px 16px;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      color: #fff; border: none;
      border-radius: 10px; cursor: pointer;
      font-size: 13.5px; font-weight: 600; font-family: inherit;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(37,99,235,0.30);
      transition: opacity 0.2s;
    }
    #checkSerialBtn:hover { opacity: 0.88; }
    #clearSerialBtn {
      padding: 10px 12px;
      background: rgba(30,41,59,0.60);
      border: 1px solid rgba(255,255,255,0.10);
      color: #64748b; border-radius: 10px;
      cursor: pointer; font-size: 14px;
    }
    #clearSerialBtn:hover { color: #fca5a5; border-color: rgba(239,68,68,0.35); }
    .serial-hint { margin: 6px 0 0; font-size: 11.5px; color: #475569; }
    .serial-hint strong { color: #60a5fa; }
    #serialFeedback { margin-top: 8px; font-size: 13.5px; font-weight: 600; }

    /* ── 最近記錄 + 書籤 ── */
    .recent-history, .bookmarks-bar {
      margin-bottom: 10px;
      font-size: 13px;
      color: #64748b;
    }
    .recent-history > span:first-child,
    .bookmarks-bar > span:first-child { font-weight: 600; margin-right: 6px; }
    .recent-tag {
      display: inline-block; margin: 2px 3px;
      padding: 3px 10px;
      background: rgba(30,41,59,0.80);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; color: #94a3b8;
      text-decoration: none; font-size: 12px; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .recent-tag:hover { background: rgba(37,99,235,0.25); color: #e2e8f0; }
    .bookmark-tag {
      display: inline-block; margin: 2px 3px;
      padding: 3px 10px;
      background: rgba(30,27,10,0.80);
      border: 1px solid rgba(245,158,11,0.30);
      border-radius: 12px; color: #fcd34d;
      text-decoration: none; font-size: 12px; cursor: pointer;
      transition: background 0.2s;
    }
    .bookmark-tag:hover { background: rgba(245,158,11,0.18); }
    .bookmark-remove, .recent-clear {
      background: none; border: none;
      color: #334155; font-size: 11px;
      cursor: pointer; padding: 0 2px;
    }
    .bookmark-remove:hover, .recent-clear:hover { color: #fca5a5; }

    /* ── 分類 Tabs ── */
    .category-tabs {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-bottom: 18px;
    }
    .cat-tab {
      padding: 7px 18px;
      border: 1.5px solid rgba(59,130,246,0.35);
      border-radius: 20px;
      background: rgba(10,18,40,0.65);
      color: #60a5fa;
      font-size: 13.5px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
    }
    .cat-tab:hover { background: rgba(37,99,235,0.20); border-color: #3b82f6; }
    .cat-tab.active {
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      border-color: transparent; color: #fff;
      box-shadow: 0 2px 12px rgba(37,99,235,0.35);
    }

    /* ── 產品列表 ── */
    #productList {
      display: flex; flex-wrap: wrap;
      gap: 8px; padding: 0;
      margin: 0; justify-content: center;
    }
    #productList li {
      list-style: none;
      width: 200px; text-align: left;
    }
    #productList a {
      text-decoration: none;
      color: #60a5fa;
      font-size: 15px; cursor: pointer;
      transition: color 0.2s;
    }
    #productList a:hover { color: #93c5fd; text-decoration: underline; }

    /* ── 公告編輯區 ── */
    /* display is controlled by inline style so JS toggle works correctly */

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .container { width: 100%; padding: 16px 12px 32px; }
      .topbar { flex-wrap: wrap; }
      .topbar-btn { padding: 7px 11px; font-size: 12.5px; }
      .header-container h1 { font-size: 16px; }
      .search-serial-row { flex-direction: column; gap: 16px; padding: 14px; }
      .col-divider { width: 100%; height: 1px; margin: 0; }
      #searchInput { width: 100%; }
      .serial-input-row { flex-wrap: wrap; }
      .cat-tab { padding: 5px 12px; font-size: 12.5px; }
      #productList li { width: 150px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 頂部操作列 -->
    <div class="topbar">
      <a id="mapButton" href="https://salty-river-39081-77ca2b964755.herokuapp.com/" target="_blank" class="topbar-btn" style="display:none;">🗺 Tech Map</a>
      <a href="feedback.html" class="topbar-btn primary">💬 Suggestions</a>
      <a id="adminBtn" href="admin.html" class="topbar-btn" style="display:none;">⚙️ Admin</a>
      <button id="logout" class="topbar-btn">🚪 Logout</button>
    </div>

    <!-- 標題 -->
    <div class="header-container">
      <h1>ATOSA — Technical Documentation Center</h1>
      <p class="sub">After-Sales Portal · Service Resources</p>
    </div>

    <!-- 公告欄 -->
    <div class="announcement-bar" id="announcementBar">
      <button class="close-btn" onclick="closeAnnouncement()">×</button>
      <h2>
        Announcement
        <button id="annEditBtn" style="display:none;" onclick="toggleAnnouncementEdit()">✏️ Edit</button>
      </h2>
      <p class="announcement-content" id="announcementContent">Loading...</p>
      <div id="announcementEditArea" style="display:none;">
        <textarea id="announcementEdit" placeholder="One line per item..."></textarea>
        <br>
        <button class="ann-edit-btn ann-save"   onclick="saveAnnouncement()">Save</button>
        <button class="ann-edit-btn ann-cancel" onclick="toggleAnnouncementEdit()">Cancel</button>
      </div>
    </div>

    <!-- 搜索 + 序號列 -->
    <div class="search-serial-row">
      <div class="search-col">
        <label class="col-label">🔍 Product Search</label>
        <input type="text" id="searchInput" placeholder="Search model or product name..." onkeyup="searchProduct()">
      </div>
      <div class="col-divider"></div>
      <div class="serial-col">
        <label class="col-label">🔢 Serial Number Check</label>
        <div class="serial-input-row">
          <input type="text" id="serialInput" placeholder="e.g. MCF8725AUS1CN4U021">
          <button id="checkSerialBtn">Check</button>
          <button id="clearSerialBtn" onclick="document.getElementById('serialInput').value='';document.getElementById('serialFeedback').innerHTML='';" title="Clear">✕</button>
        </div>
        <p class="serial-hint">Format: <strong>MCF8725 AUS 1 C N4U 021</strong></p>
        <p id="serialFeedback"></p>
      </div>
    </div>

    <!-- 最近記錄 -->
    <div class="recent-history" id="recentHistory" style="display:none;">
      <span>Recently viewed:</span>
      <span id="recentTags"></span>
      <button class="recent-clear" onclick="clearRecentHistory()" title="Clear history">✕ clear</button>
    </div>

    <!-- 書籤列 -->
    <div class="bookmarks-bar" id="bookmarksBar" style="display:none;">
      <span>⭐ Bookmarks:</span>
      <span id="bookmarkTags"></span>
      <button class="recent-clear" onclick="clearAllBookmarks()" title="Clear all bookmarks">✕ clear all</button>
    </div>

    <!-- 分類 Tabs -->
    <div class="category-tabs" id="categoryTabs">
      <button class="cat-tab active" data-cat="all"           onclick="filterByCategory('all', this)">All</button>
      <button class="cat-tab" data-cat="refrigeration"        onclick="filterByCategory('refrigeration', this)">❄️ Refrigeration</button>
      <button class="cat-tab" data-cat="cooking"              onclick="filterByCategory('cooking', this)">🔥 Cooking</button>
      <button class="cat-tab" data-cat="ice"                  onclick="filterByCategory('ice', this)">🧊 Ice</button>
      <button class="cat-tab" data-cat="walkin"               onclick="filterByCategory('walkin', this)">🚪 Walk-in</button>
      <button class="cat-tab" data-cat="display"              onclick="filterByCategory('display', this)">🪟 Display Case</button>
    </div>

    <!-- 產品列表 -->
    <div class="directory">
      <ul id="productList"></ul>
    </div>

  </div>

  <!-- 書籤 JS -->
  <script>
  function loadBookmarks() {
    const bar  = document.getElementById('bookmarksBar');
    const tags = document.getElementById('bookmarkTags');
    let bms = [];
    try { bms = JSON.parse(localStorage.getItem('atosa_bookmarks') || '[]'); } catch {}
    if (!bms.length) { bar.style.display = 'none'; return; }
    bar.style.display = '';
    tags.innerHTML = bms.map((b, i) =>
      `<a class="bookmark-tag" href="product.html?model=${encodeURIComponent(b.model)}&issue=${encodeURIComponent(b.issue)}">${b.label}</a>` +
      `<button class="bookmark-remove" onclick="removeBookmark(${i})" title="Remove">✕</button>`
    ).join('');
  }
  function removeBookmark(idx) {
    let bms = [];
    try { bms = JSON.parse(localStorage.getItem('atosa_bookmarks') || '[]'); } catch {}
    bms.splice(idx, 1);
    localStorage.setItem('atosa_bookmarks', JSON.stringify(bms));
    loadBookmarks();
  }
  function clearAllBookmarks() {
    localStorage.removeItem('atosa_bookmarks');
    loadBookmarks();
  }
  document.addEventListener('DOMContentLoaded', loadBookmarks);
  </script>

  <script src="script.js"></script>
</body>
</html>
