<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Accordion ──────────────────────────────── */
        .acc-wrap {
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .acc-hd {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            user-select: none;
            transition: opacity 0.15s;
        }
        .acc-hd:hover { opacity: 0.82; }
        .acc-arrow {
            font-size: 11px;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .acc-wrap.collapsed .acc-arrow { transform: rotate(-90deg); }
        .acc-wrap.collapsed .acc-bd    { display: none; }
        .acc-count {
            margin-left: auto;
            padding: 1px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(0,0,0,0.12);
        }
        .acc-bd { padding: 10px 16px 14px; }

        /* Level 1 — green */
        #quickGuide .acc-hd {
            background: #f0fdf4;
            border-left: 4px solid #16a34a;
            color: #15803d;
        }
        /* Level 2 — blue */
        #technicianSolution .acc-hd {
            background: #eff6ff;
            border-left: 4px solid #2563eb;
            color: #1d4ed8;
        }
        /* Non-warranty — orange */
        #customerSolution .acc-hd {
            background: #fff7ed;
            border-left: 4px solid #ea580c;
            color: #c2410c;
        }

        /* ── Active issue highlight ── */
        #problemCategoryList li.active-issue a {
            background: rgba(0,123,255,0.10);
            color: #007BFF;
            font-weight: 700;
            border-radius: 4px;
            display: block;
            padding: 2px 6px;
        }

        /* ── Share / Print toolbar ── */
        .sol-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .sol-toolbar-btn {
            padding: 5px 13px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.15s;
        }
        .sol-toolbar-btn:hover { background: #f0f4ff; }
        #bookmarkBtn.bookmarked { background: #fff8e1; border-color: #f59e0b; color: #92400e; }
        #bookmarkBtn.bookmarked:hover { background: #fef3c7; }
        .sol-issue-label {
            font-size: 13px;
            color: #555;
            margin-left: auto;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        /* ── Copy button inside accordion header ── */
        .acc-copy {
            margin-left: 6px;
            padding: 1px 7px;
            border-radius: 5px;
            border: 1px solid rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 11px;
            line-height: 1.6;
            color: inherit;
        }
        .acc-copy:hover { background: rgba(255,255,255,0.95); }

        /* ── Print styles ── */
        @media print {
            .header-container .back-home-button,
            .problem-box, .diagram-box, .file-box,
            .sol-toolbar, .acc-copy, .acc-arrow { display: none !important; }
            .grid-layout { display: block !important; }
            .solution-box { width: 100% !important; max-width: 100% !important; }
            .acc-wrap.collapsed .acc-bd { display: block !important; }
            .acc-count { display: none !important; }
            #customerSolution { display: none !important; }
            .acc-hd { font-size: 13px !important; padding: 7px 10px !important; }
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <a href="dashboard.html" class="back-home-button">Back</a>
            <h1 id="product-title"></h1>
        </div>

        <div class="grid-layout">
            <div class="frame problem-box">
                <div class="search-box">
                    <label for="problemCategorySearch">Search Issue:</label>
                    <input type="text" id="problemCategorySearch" placeholder="Search..." onkeyup="searchProblemCategory()">
                </div>
                <ul id="problemCategoryList"></ul>
            </div>

            <div class="frame solution-box">
                <div class="solution-container">

                    <!-- Share / Print toolbar -->
                    <div class="sol-toolbar">
                        <button class="sol-toolbar-btn" id="shareBtn" onclick="shareIssue()">🔗 Copy Link</button>
                        <button class="sol-toolbar-btn" onclick="window.print()">🖨 Print</button>
                        <button class="sol-toolbar-btn" id="bookmarkBtn" onclick="toggleBookmark()">☆ Save</button>
                        <span class="sol-issue-label" id="currentIssueLabel"></span>
                    </div>

                    <!-- Level 1: Quick Guide — expanded by default, green -->
                    <div class="acc-wrap" id="quickGuide">
                        <div class="acc-hd" onclick="toggleAcc('quickGuide')">
                            <span class="acc-arrow">▼</span>
                            💡 Quick Guide
                            <span class="acc-count" id="quickGuideCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('quickGuideList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="quickGuideList"><li><span style="color:grey;">Select an issue on the left.</span></li></ul>
                        </div>
                    </div>

                    <!-- Level 2: Technician Analysis — collapsed by default, blue -->
                    <div class="acc-wrap collapsed" id="technicianSolution">
                        <div class="acc-hd" onclick="toggleAcc('technicianSolution')">
                            <span class="acc-arrow">▼</span>
                            🔧 Technician Analysis
                            <span class="acc-count" id="technicianSolutionCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('technicianSolutionList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="technicianSolutionList"><li><span style="color:grey;">Select an issue on the left.</span></li></ul>
                        </div>
                    </div>

                    <!-- Non-warranty Issue — collapsed by default, orange -->
                    <div class="acc-wrap collapsed" id="customerSolution">
                        <div class="acc-hd" onclick="toggleAcc('customerSolution')">
                            <span class="acc-arrow">▼</span>
                            ⚠️ Non-warranty Issue
                            <span class="acc-count" id="customerSolutionCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('customerSolutionList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="customerSolutionList"><li><span style="color:grey;">Select an issue on the left.</span></li></ul>
                        </div>
                    </div>

                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-image" src="" alt="Product Image">
            </div>

            <div class="frame file-box">
                <h2>Documents</h2>
                <div class="documents-section">
                    <ul id="modelDocumentsList"></ul>
                </div>
                <div class="documents-section">
                    <ul id="commonDocumentsList"></ul>
                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-diagram" src="" alt="Product Diagram">
            </div>
        </div>
    </div>

    // ─── Read model from URL: product.html?model=AGR-10B ─────────────────────
    const params   = new URLSearchParams(location.search);
    const model    = params.get('model');
    const jsonFile = MODEL_JSON_MAP[model];

    if (!model || !jsonFile) {
        document.getElementById('product-title').innerText = 'Model not found: ' + (model || '(none)');
    } else {
        document.title = model;

        fetch(jsonFile)
            .then(r => r.json())
            .then(data => {
                document.getElementById('product-title').innerText = data.models[model].title;
                document.getElementById('product-image').src       = data.models[model].image;
                document.getElementById('product-diagram').src     = data.models[model].diagram;

                const problemCategoryList = document.getElementById('problemCategoryList');
                data.models[model].issues.forEach(issueKey => {
                    const li = document.createElement('li');
                    li.dataset.issue = issueKey;
                    li.innerHTML = `<a href="#" onclick="showSolution('${issueKey}')">${issueKey.charAt(0).toUpperCase() + issueKey.slice(1)}</a>`;
                    problemCategoryList.appendChild(li);
                });

                // Auto-select: use ?issue= param if valid, otherwise first issue
                const issueParam = params.get('issue');
                const issues = data.models[model].issues;
                const targetIssue = (issueParam && issues.includes(issueParam))
                    ? issueParam
                    : (issues.length > 0 ? issues[0] : null);
                if (targetIssue) showSolution(targetIssue);

                const modelDocumentsList = document.getElementById('modelDocumentsList');
                data.models[model].documents.forEach(doc => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                    modelDocumentsList.appendChild(li);
                });

                const commonDocumentsList = document.getElementById('commonDocumentsList');
                data.common.documents.forEach(doc => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                    commonDocumentsList.appendChild(li);
                });
            })
            .catch(err => console.error('Error loading model data:', err));
    }

    // ── 渲染单条 solution 条目 ──────────────────────────────────────────────────
    // 支持旧格式（HTML 字符串）和新结构化格式（对象）
    //
    // 新格式示例：
    // {
    //   "text": "主文字（黑色）",
    //   "red":  "红色说明文字（可选）",
    //   "color": "orange",              // 可选，默认 "red"
    //   "steps": [                      // 可选，自动编号，红色显示
    //     "简单步骤文字",
    //     { "text": "步骤文字", "red": "子说明", "links": [{"label":"..","url":".."}] }
    //   ],
    //   "link": { "label": "链接文字", "url": "https://..." },  // 可选
    //   "video": "路径/to/video.mp4"    // 可选，嵌入视频
    // }
    function renderItem(item) {
        if (typeof item === 'string') return item; // 旧 HTML 字符串，直接渲染

        let html = item.text || '';

        if (item.red) {
            html += `<br><span style="color:${item.color || 'red'}">${item.red}</span>`;
        }
        if (item.link) {
            html += ` <a href="${item.link.url}" target="_blank">${item.link.label}</a>`;
        }
        if (item.steps && item.steps.length) {
            item.steps.forEach((step, i) => {
                if (typeof step === 'string') {
                    html += `<br>${i + 1}.<span style="color:red">${step}</span>`;
                } else {
                    html += `<br>${i + 1}.<span style="color:red">${step.text || ''}`;
                    if (step.red) html += ` <span style="color:red">${step.red}</span>`;
                    if (step.links) step.links.forEach(l => {
                        html += ` <a href="${l.url}" target="_blank">${l.label}</a>`;
                    });
                    html += `</span>`;
                }
            });
        }
        if (item.video) {
            html += `<br><video controls preload="metadata" playsinline style="width:100%;max-width:900px;">` +
                    `<source src="${item.video}" type="video/mp4"></video>`;
        }
        html += '<br><br>';
        return html;
    }

    function toggleAcc(id) {
        document.getElementById(id).classList.toggle('collapsed');
    }

    // ── 複製解答文字 ──
    function copySection(listId, btn) {
        const el = document.getElementById(listId);
        const text = el ? el.innerText.trim() : '';
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✅';
            setTimeout(() => { btn.textContent = orig; }, 1800);
        }).catch(() => { prompt('Copy this text:', text); });
    }

    // ── 收藏夾 ──────────────────────────────────────────────────────────────────
    function _getBM()       { try { return JSON.parse(localStorage.getItem('atosa_bookmarks') || '[]'); } catch { return []; } }
    function _saveBM(bms)   { localStorage.setItem('atosa_bookmarks', JSON.stringify(bms)); }

    function _currentIssue() {
        return new URL(location.href).searchParams.get('issue') || '';
    }

    function updateBookmarkBtn() {
        const btn = document.getElementById('bookmarkBtn');
        if (!btn) return;
        const issue = _currentIssue();
        if (!issue || !model) { btn.style.display = 'none'; return; }
        btn.style.display = '';
        const saved = _getBM().some(b => b.model === model && b.issue === issue);
        btn.textContent = saved ? '⭐ Saved' : '☆ Save';
        btn.classList.toggle('bookmarked', saved);
    }

    function toggleBookmark() {
        const issue = _currentIssue();
        if (!issue || !model) return;
        let bms = _getBM();
        const idx = bms.findIndex(b => b.model === model && b.issue === issue);
        if (idx >= 0) {
            bms.splice(idx, 1);
        } else {
            const issueLabel = issue.charAt(0).toUpperCase() + issue.slice(1);
            bms.unshift({ model, issue, label: `${model} — ${issueLabel}` });
            if (bms.length > 50) bms = bms.slice(0, 50);
        }
        _saveBM(bms);
        updateBookmarkBtn();
    }

    // ── 複製當前問題鏈接 ──
    function shareIssue() {
        const btn = document.getElementById('shareBtn');
        navigator.clipboard.writeText(location.href).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✅ Copied!';
            setTimeout(() => { btn.textContent = orig; }, 2000);
        }).catch(() => { prompt('Copy this link:', location.href); });
    }

    function showSolution(category) {
        fetch(jsonFile)
            .then(r => r.json())
            .then(data => {
                const ci = data.common.issues[category] || {};
                const mi = data.models[model][category]  || {};

                const allQ = [...(ci.overview   || []), ...(mi.overview   || [])];
                const allT = [...(ci.technician || []), ...(mi.technician || [])];
                const allC = [...(ci.customer   || []), ...(mi.customer   || [])];

                // Quick Guide
                const qgList = document.getElementById('quickGuideList');
                qgList.innerHTML = allQ.length
                    ? allQ.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#aaa;font-size:13px;">No quick guide yet for this issue.</span></li>';
                document.getElementById('quickGuideCount').textContent = allQ.length || '';

                // Technician Analysis
                const techList = document.getElementById('technicianSolutionList');
                techList.innerHTML = allT.length
                    ? allT.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#aaa;font-size:13px;">No data.</span></li>';
                document.getElementById('technicianSolutionCount').textContent = allT.length || '';

                // Non-warranty Issue
                const custList = document.getElementById('customerSolutionList');
                custList.innerHTML = allC.length
                    ? allC.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#aaa;font-size:13px;">No data.</span></li>';
                document.getElementById('customerSolutionCount').textContent = allC.length || '';

                // Always re-open Quick Guide when switching issues
                document.getElementById('quickGuide').classList.remove('collapsed');

                // Update URL with current issue (for shareable link)
                const url = new URL(location.href);
                url.searchParams.set('issue', category);
                history.replaceState(null, '', url.toString());

                // Update bookmark button state
                updateBookmarkBtn();

                // Show current issue label in toolbar
                const label = document.getElementById('currentIssueLabel');
                if (label) label.textContent = category.charAt(0).toUpperCase() + category.slice(1);

                // Highlight active issue in left panel
                document.querySelectorAll('#problemCategoryList li').forEach(li => {
                    li.classList.toggle('active-issue', li.dataset.issue === category);
                });
            })
            .catch(err => console.error('Error loading issue data:', err));
    }

    // ── 未登入時 Back → ✕ Close ──
    (async function () {
        try {
            const res = await fetch('/api/me');
            if (!res.ok) throw new Error('not logged in');
            const { role } = await res.json();
            if (!role) throw new Error('no role');
            // 已登入，保持 Back 原樣
        } catch {
            const btn = document.querySelector('.back-home-button');
            if (btn) {
                btn.textContent = '✕ Close';
                btn.removeAttribute('href');
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.close();
                });
            }
        }
    })();

    function searchProblemCategory() {
        const val   = document.getElementById('problemCategorySearch').value.toLowerCase();
        const items = document.getElementById('problemCategoryList').getElementsByTagName('li');
        for (const item of items) {
            item.style.display = (item.textContent || item.innerText).toLowerCase().includes(val) ? '' : 'none';
        }
    }
    </script>

    <script src="script.js"></script>
</body>
</html>
