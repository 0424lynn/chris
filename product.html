<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <a href="dashboard.html" class="back-home-button">Back</a>
            <h1 id="product-title"></h1>
        </div>

        <div class="grid-layout">
            <div class="frame problem-box">
                <div class="search-box">
                    <label for="problemCategorySearch">Search Issue:</label>
                    <input type="text" id="problemCategorySearch" placeholder="Search..." onkeyup="searchProblemCategory()">
                </div>
                <ul id="problemCategoryList"></ul>
            </div>

            <div class="frame solution-box">
                <div class="solution-container">
                    <div class="solution-section" id="customerSolution">
                        <div class="solution-header">Non-warranty Issue</div>
                        <ul><li><span style="color:grey;">Select an issue on the left to see the solution for the customer.</span></li></ul>
                    </div>
                    <div class="solution-section" id="technicianSolution">
                        <div class="solution-header">Technician Solution</div>
                        <ul><li><span style="color:grey;">Select an issue on the left to see the solution for the technician.</span></li></ul>
                    </div>
                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-image" src="" alt="Product Image">
            </div>

            <div class="frame file-box">
                <h2>Documents</h2>
                <div class="documents-section">
                    <ul id="modelDocumentsList"></ul>
                </div>
                <div class="documents-section">
                    <ul id="commonDocumentsList"></ul>
                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-diagram" src="" alt="Product Diagram">
            </div>
        </div>
    </div>

    // ─── Read model from URL: product.html?model=AGR-10B ─────────────────────
    const params   = new URLSearchParams(location.search);
    const model    = params.get('model');
    const jsonFile = MODEL_JSON_MAP[model];

    if (!model || !jsonFile) {
        document.getElementById('product-title').innerText = 'Model not found: ' + (model || '(none)');
    } else {
        document.title = model;

        fetch(jsonFile)
            .then(r => r.json())
            .then(data => {
                document.getElementById('product-title').innerText = data.models[model].title;
                document.getElementById('product-image').src       = data.models[model].image;
                document.getElementById('product-diagram').src     = data.models[model].diagram;

                const problemCategoryList = document.getElementById('problemCategoryList');
                data.models[model].issues.forEach(issueKey => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#" onclick="showSolution('${issueKey}')">${issueKey.charAt(0).toUpperCase() + issueKey.slice(1)}</a>`;
                    problemCategoryList.appendChild(li);
                });

                // 自动选中第一个问题
                if (data.models[model].issues.length > 0) {
                    showSolution(data.models[model].issues[0]);
                }

                const modelDocumentsList = document.getElementById('modelDocumentsList');
                data.models[model].documents.forEach(doc => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                    modelDocumentsList.appendChild(li);
                });

                const commonDocumentsList = document.getElementById('commonDocumentsList');
                data.common.documents.forEach(doc => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                    commonDocumentsList.appendChild(li);
                });
            })
            .catch(err => console.error('Error loading model data:', err));
    }

    function showSolution(category) {
        fetch(jsonFile)
            .then(r => r.json())
            .then(data => {
                const customerSolution    = document.getElementById('customerSolution');
                const technicianSolution  = document.getElementById('technicianSolution');

                const commonC = data.common.issues[category]?.customer    || [];
                const commonT = data.common.issues[category]?.technician  || [];
                const modelC  = data.models[model][category]?.customer    || [];
                const modelT  = data.models[model][category]?.technician  || [];

                const allC = [...commonC, ...modelC];
                const allT = [...commonT, ...modelT];

                customerSolution.innerHTML   = `<div class="solution-header">Non-warranty Issue</div><ul>${allC.map(s => `<li>${s}</li>`).join('')}</ul>`;
                technicianSolution.innerHTML = `<div class="solution-header">Technician Solution</div><ul>${allT.map(s => `<li>${s}</li>`).join('')}</ul>`;
            })
            .catch(err => console.error('Error loading issue data:', err));
    }

    function searchProblemCategory() {
        const val   = document.getElementById('problemCategorySearch').value.toLowerCase();
        const items = document.getElementById('problemCategoryList').getElementsByTagName('li');
        for (const item of items) {
            item.style.display = (item.textContent || item.innerText).toLowerCase().includes(val) ? '' : 'none';
        }
    }

    <script src="script.js"></script>

</html>
