<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Dark Aurora Theme Overrides ──────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif !important;
            background: #0d1b2e !important;
            background-image: none !important;
            color: #e2e8f0;
            display: block !important;
            align-items: unset !important;
            justify-content: unset !important;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 55% at 10% 20%, rgba(37,99,235,0.38) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(109,40,217,0.28) 0%, transparent 55%),
                radial-gradient(ellipse 45% 40% at 55% 5%,  rgba(14,165,233,0.20) 0%, transparent 50%);
            animation: auroraP 14s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes auroraP {
            0%   { opacity: 1;    filter: blur(38px); }
            50%  { opacity: 0.72; filter: blur(56px); }
            100% { opacity: 1;    filter: blur(38px); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(10,18,40,0.72) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            box-shadow: 0 8px 40px rgba(0,0,0,0.50) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 18px !important;
            margin: 20px auto !important;
            padding: 24px 24px 28px !important;
        }

        .frame {
            background: rgba(8,15,35,0.70) !important;
            border: 1px solid rgba(255,255,255,0.10) !important;
            border-radius: 12px !important;
            box-shadow: none !important;
        }
        .diagram-box {
            padding: 12px;
            text-align: center;
        }
        .diagram-box img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: zoom-in;
        }

        /* ── Header ── */
        .header-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header-container h1 {
            font-size: 1.3rem !important;
            font-weight: 800 !important;
            color: #f1f5f9 !important;
            letter-spacing: -0.3px;
            flex: 1;
        }
        .back-home-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px !important;
            border-radius: 10px !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            background: rgba(15,23,42,0.70) !important;
            color: #cbd5e1 !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            font-family: inherit;
        }
        .back-home-button:hover {
            background: rgba(37,99,235,0.25) !important;
            border-color: rgba(59,130,246,0.45) !important;
            color: #e2e8f0 !important;
        }

        /* ── Problem box (left panel) ── */
        .problem-box ul li a {
            color: #60a5fa;
        }
        .problem-box ul li a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        #problemCategoryList li.active-issue a {
            background: rgba(37,99,235,0.20) !important;
        }

        /* ── Search box ── */
        .search-box label {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            display: block;
            margin-bottom: 6px;
        }
        #problemCategorySearch {
            background: rgba(5,12,28,0.85) !important;
            border: 1.5px solid rgba(255,255,255,0.10) !important;
            border-radius: 8px !important;
            color: #e2e8f0 !important;
            padding: 8px 12px !important;
            font-size: 13.5px !important;
            font-family: inherit;
            outline: none;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #problemCategorySearch::placeholder { color: #334155; }
        #problemCategorySearch:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        /* ── Toolbar buttons ── */
        .sol-toolbar-btn {
            background: rgba(15,23,42,0.70) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            color: #cbd5e1 !important;
            border-radius: 8px !important;
            transition: background 0.2s, border-color 0.2s;
            backdrop-filter: blur(6px);
        }
        .sol-toolbar-btn:hover {
            background: rgba(37,99,235,0.22) !important;
            border-color: rgba(59,130,246,0.40) !important;
            color: #e2e8f0 !important;
        }
        #bookmarkBtn.bookmarked {
            background: rgba(120,53,15,0.35) !important;
            border-color: rgba(245,158,11,0.45) !important;
            color: #fcd34d !important;
        }

        /* ── Documents box ── */
        .file-box h2 {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        #modelDocumentsList a, #commonDocumentsList a {
            color: #60a5fa;
            text-decoration: none;
        }
        #modelDocumentsList a:hover, #commonDocumentsList a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        /* ── Fix worked button ── */
        #fixWorkedBtn {
            background: rgba(6,78,59,0.40) !important;
            border: 1.5px solid rgba(74,222,128,0.40) !important;
            color: #4ade80 !important;
        }
        #fixWorkedBtn:hover { background: rgba(6,78,59,0.60) !important; }
        #fixWorkedBtn.fix-logged {
            background: rgba(6,78,59,0.70) !important;
            border-color: #4ade80 !important;
            color: #4ade80 !important;
        }
        .fix-count-label { color: #94a3b8 !important; }
        .fix-count-label strong { color: #4ade80 !important; }
        .fix-worked-wrap { border-top-color: rgba(255,255,255,0.08) !important; }

        .sol-issue-label { color: #64748b !important; }

        /* ── Accordion ──────────────────────────────── */
        .acc-wrap {
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .acc-hd {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 14.5px;
            font-weight: 700;
            user-select: none;
            transition: opacity 0.15s;
        }
        .acc-hd:hover { opacity: 0.82; }
        .acc-arrow {
            font-size: 11px;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .acc-wrap.collapsed .acc-arrow { transform: rotate(-90deg); }
        .acc-wrap.collapsed .acc-bd    { display: none; }
        .acc-count {
            margin-left: auto;
            padding: 1px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(255,255,255,0.10);
            color: inherit;
        }
        .acc-bd {
            padding: 10px 14px 14px;
            color: #e2e8f0;
            font-size: 15px;
            line-height: 1.75;
        }
        .acc-bd ul { padding: 0; margin: 0; }
        .acc-bd li {
            list-style: none;
            margin: 0;
            padding: 14px 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .acc-bd li:last-child { border-bottom: none; padding-bottom: 4px; }

        /* ── Per-item mini accordion ── */
        .item-acc {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
            margin-bottom: 6px;
            transition: background 0.15s;
        }
        .item-acc.open { background: rgba(255,255,255,0.04); }
        .item-acc-hd {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .item-acc-hd:hover { background: rgba(255,255,255,0.05); }
        .item-acc-arrow {
            font-size: 10px;
            color: #64748b;
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .item-acc.open .item-acc-arrow { transform: rotate(90deg); color: #94a3b8; }
        .item-acc-bd {
            display: none;
            padding: 2px 18px 16px 36px;
            line-height: 1.75;
        }
        .item-acc.open .item-acc-bd { display: block; }

        /* Level 1 — green (dark theme) */
        #quickGuide .acc-hd {
            background: rgba(5,46,22,0.55);
            border-left: 4px solid #16a34a;
            color: #4ade80;
        }
        /* Level 2 — blue (dark theme) */
        #technicianSolution .acc-hd {
            background: rgba(30,58,138,0.45);
            border-left: 4px solid #3b82f6;
            color: #93c5fd;
        }
        /* Non-warranty — orange (dark theme) */
        #customerSolution .acc-hd {
            background: rgba(124,45,18,0.45);
            border-left: 4px solid #f97316;
            color: #fb923c;
        }

        /* ── Active issue highlight ── */
        #problemCategoryList li.active-issue a {
            background: rgba(0,123,255,0.10);
            font-weight: 700;
            border-radius: 4px;
            display: block;
            padding: 2px 6px;
        }

        /* ── Share / Print toolbar ── */
        .sol-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .sol-toolbar-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15,23,42,0.70);
            color: #cbd5e1;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s, border-color 0.2s;
            backdrop-filter: blur(6px);
        }
        .sol-toolbar-btn:hover {
            background: rgba(37,99,235,0.22);
            border-color: rgba(59,130,246,0.40);
            color: #e2e8f0;
        }
        #bookmarkBtn.bookmarked {
            background: rgba(120,53,15,0.35);
            border-color: rgba(245,158,11,0.45);
            color: #fcd34d;
        }
        #bookmarkBtn.bookmarked:hover { background: rgba(120,53,15,0.55); }

        /* ── Fix Worked button ── */
        .fix-worked-wrap {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.10);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #fixWorkedBtn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1.5px solid rgba(74,222,128,0.40);
            background: rgba(6,78,59,0.40);
            color: #4ade80;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        #fixWorkedBtn:hover { background: rgba(6,78,59,0.60); }
        #fixWorkedBtn:active { transform: scale(0.96); }
        #fixWorkedBtn.fix-logged {
            background: rgba(6,78,59,0.70);
            border-color: #4ade80;
            color: #4ade80;
        }
        .fix-count-label {
            font-size: 12px;
            color: #94a3b8;
        }
        .fix-count-label strong { color: #4ade80; }
        .sol-issue-label {
            font-size: 13px;
            color: #64748b;
            margin-left: auto;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        /* ── Copy button inside accordion header ── */
        .acc-copy {
            margin-left: 6px;
            padding: 2px 8px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.10);
            cursor: pointer;
            font-size: 11px;
            line-height: 1.6;
            color: inherit;
        }
        .acc-copy:hover { background: rgba(255,255,255,0.20); }

        /* ── Print styles ── */
        @media print {
            .header-container .back-home-button,
            .problem-box, .diagram-box, .file-box,
            .sol-toolbar, .acc-copy, .acc-arrow { display: none !important; }
            .grid-layout { display: block !important; }
            .solution-box { width: 100% !important; max-width: 100% !important; }
            .acc-wrap.collapsed .acc-bd { display: block !important; }
            .acc-count { display: none !important; }
            #customerSolution { display: none !important; }
            .acc-hd { font-size: 13px !important; padding: 7px 10px !important; }
        }
    .ticker-bar { display:none; width:100%; background:transparent; overflow:hidden; position:relative; z-index:999; padding:10px 0; }
    .ticker-bar.show { display:block; }
    .ticker-track { display:inline-block; white-space:nowrap; animation:ticker-scroll 30s linear infinite; padding-left:100%; }
    @keyframes ticker-scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-100%); } }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <div class="ticker-bar" id="tickerBar"><span class="ticker-track" id="tickerText"></span></div>
    <div class="container">
        <div class="header-container">
            <a href="dashboard.html" class="back-home-button">Back</a>
            <h1 id="product-title"></h1>
        </div>

        <div class="grid-layout">
            <div class="frame problem-box">
                <div class="search-box">
                    <label for="problemCategorySearch">Search Issue:</label>
                    <input type="text" id="problemCategorySearch" placeholder="Search..." onkeyup="searchProblemCategory()">
                </div>
                <ul id="problemCategoryList"></ul>
            </div>

            <div class="frame solution-box">
                <div class="solution-container">

                    <!-- Share / Print toolbar -->
                    <div class="sol-toolbar">
                        <button class="sol-toolbar-btn" id="shareBtn" onclick="shareIssue()">🔗 Copy Link</button>
                        <button class="sol-toolbar-btn" onclick="window.print()">🖨 Print</button>
                        <button class="sol-toolbar-btn" id="bookmarkBtn" onclick="toggleBookmark()">☆ Save</button>
                        <span class="sol-issue-label" id="currentIssueLabel"></span>
                    </div>

                    <!-- Level 1: Quick Guide — expanded by default, green -->
                    <div class="acc-wrap" id="quickGuide">
                        <div class="acc-hd" onclick="toggleAcc('quickGuide')">
                            <span class="acc-arrow">▼</span>
                            💡 Quick Guide
                            <span class="acc-count" id="quickGuideCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('quickGuideList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="quickGuideList"><li><span style="color:#475569;">Select an issue on the left.</span></li></ul>
                        </div>
                    </div>

                    <!-- Level 2: Technician Analysis — collapsed by default, blue -->
                    <div class="acc-wrap collapsed" id="technicianSolution">
                        <div class="acc-hd" onclick="toggleAcc('technicianSolution')">
                            <span class="acc-arrow">▼</span>
                            🔧 Technician Analysis
                            <span class="acc-count" id="technicianSolutionCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('technicianSolutionList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="technicianSolutionList"><li><span style="color:#475569;">Select an issue on the left.</span></li></ul>
                            <div class="fix-worked-wrap" id="fixWorkedWrap" style="display:none;">
                                <button id="fixWorkedBtn" onclick="markFixWorked()">✅ This fix worked</button>
                                <span class="fix-count-label" id="fixCountLabel"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Non-warranty Issue — collapsed by default, orange -->
                    <div class="acc-wrap collapsed" id="customerSolution">
                        <div class="acc-hd" onclick="toggleAcc('customerSolution')">
                            <span class="acc-arrow">▼</span>
                            ⚠️ Non-warranty Issue
                            <span class="acc-count" id="customerSolutionCount"></span>
                            <button class="acc-copy" onclick="event.stopPropagation();copySection('customerSolutionList',this)" title="Copy text">📋</button>
                        </div>
                        <div class="acc-bd">
                            <ul id="customerSolutionList"><li><span style="color:#475569;">Select an issue on the left.</span></li></ul>
                        </div>
                    </div>

                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-image" src="" alt="Product Image">
            </div>

            <div class="frame file-box">
                <h2>Documents</h2>
                <div class="documents-section">
                    <ul id="modelDocumentsList"></ul>
                </div>
                <div class="documents-section">
                    <ul id="commonDocumentsList"></ul>
                </div>
            </div>

            <div class="frame diagram-box">
                <img id="product-diagram" src="" alt="Product Diagram">
            </div>
        </div>
    </div>

    <script>

    // ─── Read model from URL: product.html?model=AGR-10B ─────────────────────
    const params = new URLSearchParams(location.search);
    const model  = params.get('model');

    // Cache fetched data here so showSolution doesn't re-fetch on every click
    let pageData = null;

    // ─── Async init: merge static map with dynamic map from server ────────────
    (async function () {
        // Merge: dynamic map (from MongoDB) overrides static map
        // This lets new models added via Admin panel work without a code deploy
        let modelMap = { ...STATIC_MODEL_MAP };
        try {
            const r = await fetch('/api/modelmap');
            if (r.ok) Object.assign(modelMap, await r.json());
        } catch {}

        const jsonFile = modelMap[model];
        // Strip .json if present (static map has .json; dynamic map stores key only)
        const fileKey = jsonFile ? jsonFile.replace('.json', '') : null;
        const apiUrl  = fileKey ? '/api/modeldata/' + fileKey : null;

        if (!model || !fileKey) {
            document.getElementById('product-title').innerText = 'Model not found: ' + (model || '(none)');
            return;
        }

        document.title = model;
        try {
            const r    = await fetch(apiUrl, { cache: 'no-store' });
            const data = await r.json();
            pageData = data; // ← cache it

            // Guard: model may exist in the family map without a full entry
            // (e.g. added only via Model-Specific Extras in an issue editor)
            const modelEntry = data.models[model] || {};
            document.getElementById('product-title').innerText = modelEntry.title || model;
            document.getElementById('product-image').src       = modelEntry.image   || '';
            document.getElementById('product-diagram').src     = modelEntry.diagram || '';

            // Build issues list, always sorted by issueOrder if available
            const _order = data.common?.issueOrder;
            const _sortByOrder = (arr) => {
                if (!Array.isArray(_order) || !_order.length) return arr;
                return [..._order.filter(k => arr.includes(k)), ...arr.filter(k => !_order.includes(k))];
            };
            const issues = _sortByOrder(
                (modelEntry.issues && modelEntry.issues.length > 0)
                    ? modelEntry.issues
                    : Object.keys(data.common.issues || {})
            );

            const problemCategoryList = document.getElementById('problemCategoryList');
            issues.forEach(issueKey => {
                const li = document.createElement('li');
                li.dataset.issue = issueKey;
                const iss = data.common?.issues?.[issueKey] || {};
                const lbl = iss.label || (issueKey.charAt(0).toUpperCase() + issueKey.slice(1));
                const colorAttr = iss.color ? ` style="color:${iss.color};font-weight:600;" data-color="${iss.color}"` : '';
                li.innerHTML = `<a href="#" onclick="showSolution('${issueKey}')"${colorAttr}>${lbl}</a>`;
                problemCategoryList.appendChild(li);
            });

            // Auto-select: use ?issue= param if valid, otherwise first issue
            const issueParam = params.get('issue');
            const targetIssue = (issueParam && issues.includes(issueParam))
                ? issueParam
                : (issues.length > 0 ? issues[0] : null);
            if (targetIssue) showSolution(targetIssue);

            const modelDocumentsList = document.getElementById('modelDocumentsList');
            (modelEntry.documents || []).forEach(doc => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                modelDocumentsList.appendChild(li);
            });

            const commonDocumentsList = document.getElementById('commonDocumentsList');
            (data.common.documents || []).forEach(doc => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${doc.url}" target="_blank">${doc.title}</a>`;
                commonDocumentsList.appendChild(li);
            });
        } catch (err) {
            console.error('Error loading model data:', err);
        }
    })();

    // ── 渲染单条 solution 条目 ──────────────────────────────────────────────────
    // 支持旧格式（HTML 字符串）和新结构化格式（对象）
    //
    // 新格式示例：
    // {
    //   "text": "主文字（黑色）",
    //   "red":  "红色说明文字（可选）",
    //   "color": "orange",              // 可选，默认 "red"
    //   "steps": [                      // 可选，自动编号，红色显示
    //     "简单步骤文字",
    //     { "text": "步骤文字", "red": "子说明", "links": [{"label":"..","url":".."}] }
    //   ],
    //   "link": { "label": "链接文字", "url": "https://..." },  // 可选
    //   "video": "路径/to/video.mp4"    // 可选，嵌入视频
    // }
    function renderItem(item) {
        if (typeof item === 'string') return item; // 旧 HTML 字符串，直接渲染

        let html = '';
        const nl2br = s => (s || '').replace(/\n/g, '<br>');

        if (item.text) {
            html += `<div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:6px;white-space:pre-line;">${item.text}</div>`;
        }
        if (item.red) {
            html += `<div style="color:#16a34a;font-size:17px;font-weight:700;margin-bottom:6px;line-height:1.7;white-space:pre-line;">${item.red}</div>`;
        }
        if (item.link) {
            html += `<div style="margin-bottom:6px;"><a href="${item.link.url}" target="_blank" style="color:#60a5fa;font-size:16px;">${item.link.label}</a></div>`;
        }
        if (item.steps && item.steps.length) {
            const multi = item.steps.length > 1;
            item.steps.forEach((step, i) => {
                const prefix = multi ? `<span style="font-weight:600;">${i + 1}.</span> ` : '';
                const mb = multi ? '14px' : '6px';
                if (typeof step === 'string') {
                    html += `<div style="color:#f87171;font-size:16px;margin-bottom:${mb};white-space:pre-line;">${prefix}${step}</div>`;
                } else {
                    html += `<div style="color:#f87171;font-size:16px;margin-bottom:${mb};white-space:pre-line;">${prefix}${step.text || ''}`;
                    if (step.red) html += ` <span style="color:#f87171;">${step.red}</span>`;
                    if (step.links) step.links.forEach(l => {
                        html += ` <a href="${l.url}" target="_blank" style="color:#60a5fa;">${l.label}</a>`;
                    });
                    html += `</div>`;
                }
            });
        }
        if (item.video) {
            const gdMatch = item.video.match(/drive\.google\.com\/file\/d\/([^/]+)/);
            if (gdMatch) {
                const embedUrl = `https://drive.google.com/file/d/${gdMatch[1]}/preview`;
                html += `<iframe src="${embedUrl}" width="100%" height="480" style="max-width:900px;margin-top:8px;border-radius:8px;border:none;display:block;" allowfullscreen></iframe>`;
            } else {
                html += `<video controls preload="metadata" playsinline style="width:100%;max-width:900px;margin-top:8px;border-radius:8px;"><source src="${item.video}" type="video/mp4"></video>`;
            }
        }
        return html;
    }

    function toggleAcc(id) {
        document.getElementById(id).classList.toggle('collapsed');
    }

    // ── 複製解答文字 ──
    function copySection(listId, btn) {
        const el = document.getElementById(listId);
        const text = el ? el.innerText.trim() : '';
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✅';
            setTimeout(() => { btn.textContent = orig; }, 1800);
        }).catch(() => { prompt('Copy this text:', text); });
    }

    // ── 收藏夾 ──────────────────────────────────────────────────────────────────
    function _getBM()       { try { return JSON.parse(localStorage.getItem('atosa_bookmarks') || '[]'); } catch { return []; } }
    function _saveBM(bms)   { localStorage.setItem('atosa_bookmarks', JSON.stringify(bms)); }

    function _currentIssue() {
        return new URL(location.href).searchParams.get('issue') || '';
    }

    function updateBookmarkBtn() {
        const btn = document.getElementById('bookmarkBtn');
        if (!btn) return;
        const issue = _currentIssue();
        if (!issue || !model) { btn.style.display = 'none'; return; }
        btn.style.display = '';
        const saved = _getBM().some(b => b.model === model && b.issue === issue);
        btn.textContent = saved ? '⭐ Saved' : '☆ Save';
        btn.classList.toggle('bookmarked', saved);
    }

    function toggleBookmark() {
        const issue = _currentIssue();
        if (!issue || !model) return;
        let bms = _getBM();
        const idx = bms.findIndex(b => b.model === model && b.issue === issue);
        if (idx >= 0) {
            bms.splice(idx, 1);
        } else {
            const issueLabel = issue.charAt(0).toUpperCase() + issue.slice(1);
            bms.unshift({ model, issue, label: `${model} — ${issueLabel}` });
            if (bms.length > 50) bms = bms.slice(0, 50);
        }
        _saveBM(bms);
        updateBookmarkBtn();
    }

    // ── This fix worked ──────────────────────────────────────────────────────────
    function _getFixLog()   { try { return JSON.parse(localStorage.getItem('atosa_fix_log') || '[]'); } catch { return []; } }
    function _saveFixLog(l) { localStorage.setItem('atosa_fix_log', JSON.stringify(l)); }

    function getFixCount(m, iss) {
        return _getFixLog().filter(e => e.model === m && e.issue === iss).length;
    }

    function updateFixBtn() {
        const wrap  = document.getElementById('fixWorkedWrap');
        const btn   = document.getElementById('fixWorkedBtn');
        const label = document.getElementById('fixCountLabel');
        const issue = _currentIssue();
        if (!wrap || !issue || !model) { if (wrap) wrap.style.display = 'none'; return; }
        wrap.style.display = '';
        const cnt = getFixCount(model, issue);
        if (cnt > 0) {
            btn.textContent = '✅ Worked!';
            btn.classList.add('fix-logged');
            label.innerHTML = `Reported solved <strong>${cnt}</strong> time${cnt > 1 ? 's' : ''}`;
        } else {
            btn.textContent = '✅ This fix worked';
            btn.classList.remove('fix-logged');
            label.textContent = '';
        }
    }

    function markFixWorked() {
        const issue = _currentIssue();
        if (!issue || !model) return;
        const log = _getFixLog();
        log.push({ model, issue, ts: Date.now() });
        _saveFixLog(log);
        updateFixBtn();
        // brief pulse animation
        const btn = document.getElementById('fixWorkedBtn');
        btn.style.transform = 'scale(1.08)';
        setTimeout(() => { btn.style.transform = ''; }, 200);
    }

    // ── 複製當前問題鏈接 ──
    function shareIssue() {
        const btn = document.getElementById('shareBtn');
        navigator.clipboard.writeText(location.href).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✅ Copied!';
            setTimeout(() => { btn.textContent = orig; }, 2000);
        }).catch(() => { prompt('Copy this link:', location.href); });
    }

    function showSolution(category) {
        if (!pageData) return; // data not loaded yet
        (function(data) {
                const ci = data.common.issues[category]                      || {};
                const mi = ((data.models[model] || {})[category])            || {};

                const allQ = [...(ci.overview   || []), ...(mi.overview   || [])];
                const allT = [...(ci.technician || []), ...(mi.technician || [])];
                const allC = [...(ci.customer   || []), ...(mi.customer   || [])];

                // Quick Guide
                const qgList = document.getElementById('quickGuideList');
                qgList.innerHTML = allQ.length
                    ? allQ.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#64748b;font-size:13px;">No quick guide yet for this issue.</span></li>';
                document.getElementById('quickGuideCount').textContent = allQ.length || '';

                // Technician Analysis
                const techList = document.getElementById('technicianSolutionList');
                techList.innerHTML = allT.length
                    ? allT.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#64748b;font-size:13px;">No data.</span></li>';
                document.getElementById('technicianSolutionCount').textContent = allT.length || '';

                // Non-warranty Issue
                const custList = document.getElementById('customerSolutionList');
                custList.innerHTML = allC.length
                    ? allC.map(s => `<li>${renderItem(s)}</li>`).join('')
                    : '<li><span style="color:#64748b;font-size:13px;">No data.</span></li>';
                document.getElementById('customerSolutionCount').textContent = allC.length || '';

                // Reset accordion states on every issue switch:
                // Quick Guide always open; Technician & Non-warranty always collapsed
                document.getElementById('quickGuide').classList.remove('collapsed');
                document.getElementById('technicianSolution').classList.add('collapsed');
                document.getElementById('customerSolution').classList.add('collapsed');

                // Update URL with current issue (for shareable link)
                const url = new URL(location.href);
                url.searchParams.set('issue', category);
                history.replaceState(null, '', url.toString());

                // Update bookmark + fix-worked button state
                updateBookmarkBtn();
                updateFixBtn();

                // Highlight search term in rendered content
                highlightSearchInContent();

                // Show current issue label in toolbar
                const label = document.getElementById('currentIssueLabel');
                if (label) label.textContent = category.charAt(0).toUpperCase() + category.slice(1);

                // Highlight active issue in left panel
                document.querySelectorAll('#problemCategoryList li').forEach(li => {
                    li.classList.toggle('active-issue', li.dataset.issue === category);
                });
        })(pageData);
    }

    // ── 未登入時 Back → ✕ Close ──
    (async function () {
        try {
            const res = await fetch('/api/me');
            if (!res.ok) throw new Error('not logged in');
            const { role } = await res.json();
            if (!role) throw new Error('no role');
            // 已登入，保持 Back 原樣
        } catch {
            const btn = document.querySelector('.back-home-button');
            if (btn) {
                btn.textContent = '✕ Close';
                btn.removeAttribute('href');
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.close();
                });
            }
        }
    })();

    function searchProblemCategory() {
        const val   = document.getElementById('problemCategorySearch').value.toLowerCase().trim();
        const items = document.getElementById('problemCategoryList').getElementsByTagName('li');
        clearSearchHighlights();
        if (!val) {
            for (const item of items) {
                item.style.display = '';
                const a = item.querySelector('a');
                if (a) { a.style.color = ''; a.style.fontStyle = ''; }
            }
            return;
        }
        for (const item of items) {
            const issueKey  = item.dataset.issue;
            const labelMatch = (item.textContent || item.innerText).toLowerCase().includes(val);
            let contentMatch = false;
            if (!labelMatch && pageData && issueKey) {
                const issueData = pageData.common?.issues?.[issueKey];
                if (issueData) contentMatch = JSON.stringify(issueData).toLowerCase().includes(val);
            }
            item.style.display = (labelMatch || contentMatch) ? '' : 'none';
            const a = item.querySelector('a');
            if (a) {
                a.style.color     = (contentMatch && !labelMatch) ? '#60a5fa' : '';
                a.style.fontStyle = (contentMatch && !labelMatch) ? 'italic'  : '';
            }
        }
    }

    function clearSearchHighlights() {
        document.querySelectorAll('.search-highlight').forEach(el => {
            el.parentNode.replaceChild(document.createTextNode(el.textContent), el);
        });
    }

    function highlightSearchInContent() {
        const val = document.getElementById('problemCategorySearch').value.trim();
        if (!val || val.length < 2) return;
        const panels = ['quickGuideList','technicianSolutionList','customerSolutionList'];
        const lower  = val.toLowerCase();
        panels.forEach(id => {
            const container = document.getElementById(id);
            if (!container) return;
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            nodes.forEach(node => {
                const text = node.textContent;
                const idx  = text.toLowerCase().indexOf(lower);
                if (idx === -1) return;
                const mark = document.createElement('mark');
                mark.className  = 'search-highlight';
                mark.style.cssText = 'background:#fbbf24;color:#1e293b;border-radius:2px;padding:0 2px;';
                mark.textContent = text.slice(idx, idx + val.length);
                const before = document.createTextNode(text.slice(0, idx));
                const after  = document.createTextNode(text.slice(idx + val.length));
                const parent = node.parentNode;
                parent.replaceChild(after, node);
                parent.insertBefore(mark, after);
                parent.insertBefore(before, mark);
            });
        });
        const first = document.querySelector('.search-highlight');
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
