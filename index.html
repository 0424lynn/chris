<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATOSA — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 全頁背景 ── */
    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: #050d1f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 流動光暈 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 25%, rgba(30,86,200,0.38) 0%, transparent 60%),
        radial-gradient(ellipse 65% 55% at 85% 75%, rgba(109,40,217,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 50% 45% at 55% 10%, rgba(14,165,233,0.20) 0%, transparent 50%);
      animation: aurora 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes aurora {
      0%   { opacity: 1;   filter: blur(38px); }
      50%  { opacity: 0.75; filter: blur(56px); }
      100% { opacity: 1;   filter: blur(38px); }
    }

    /* 浮動粒子裝飾 */
    .particle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.12;
      animation: float linear infinite;
      pointer-events: none;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ── 卡片容器 ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      background: rgba(10, 18, 40, 0.78);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 40px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 64px rgba(0,0,0,0.60),
        0 4px 20px rgba(37,99,235,0.15);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 28px rgba(37,99,235,0.45);
    }

    /* ── 標題 ── */
    h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      font-size: 13px;
      margin-bottom: 32px;
      letter-spacing: 0.2px;
    }

    /* ── 表單 ── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: rgba(5, 12, 28, 0.85);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: #334155; }
    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.18);
    }

    /* ── 密碼行（顯示/隱藏切換） ── */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 4px;
      color: #475569;
      font-size: 16px;
      line-height: 1;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: #94a3b8; }

    /* ── 登入按鈕 ── */
    .login-btn {
      width: 100%;
      height: 46px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.3px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      box-shadow: 0 4px 20px rgba(37,99,235,0.40);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .login-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .login-btn:hover {
      opacity: 0.93;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(37,99,235,0.55);
    }
    .login-btn:active { transform: translateY(0); opacity: 1; }
    .login-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }

    /* ── 錯誤訊息 ── */
    #error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.30);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    /* ── 底部 ── */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #1e293b;
    }
  </style>
</head>
<body>

  <!-- 浮動粒子 -->
  <div class="particle" style="width:6px;height:6px;background:#3b82f6;left:15%;animation-duration:18s;animation-delay:0s;"></div>
  <div class="particle" style="width:4px;height:4px;background:#7c3aed;left:75%;animation-duration:22s;animation-delay:4s;"></div>
  <div class="particle" style="width:5px;height:5px;background:#0ea5e9;left:45%;animation-duration:16s;animation-delay:8s;"></div>
  <div class="particle" style="width:3px;height:3px;background:#a855f7;left:60%;animation-duration:20s;animation-delay:2s;"></div>
  <div class="particle" style="width:7px;height:7px;background:#2563eb;left:30%;animation-duration:25s;animation-delay:6s;"></div>

  <div class="card">
    <!-- Logo -->
    <div class="logo">🏢</div>

    <!-- 標題 -->
    <h1>ATOSA — TDC</h1>
    <p class="subtitle">After-Sales Portal</p>

    <!-- 表單 -->
    <form id="login-form" onsubmit="return false;" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username"
               autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle" title="Show/Hide password">👁</button>
        </div>
      </div>

      <button type="button" id="loginBtn" class="login-btn">Login</button>
      <div id="error-msg"></div>
    </form>

    <p class="footer">© Atosa USA · All rights reserved</p>
  </div>

  <script>
    // 顯示/隱藏密碼
    document.getElementById('pwToggle').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? '🙈' : '👁';
    });

    // Enter 鍵觸發登入
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('username').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
