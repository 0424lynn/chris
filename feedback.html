<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Suggestions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: #0d1b2e;
      color: #e2e8f0;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Aurora background ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 10% 20%, rgba(37,99,235,0.38) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(109,40,217,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 55% 5%,  rgba(14,165,233,0.20) 0%, transparent 50%);
      animation: aurora 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes aurora {
      0%   { opacity: 1;    filter: blur(38px); }
      50%  { opacity: 0.72; filter: blur(56px); }
      100% { opacity: 1;    filter: blur(38px); }
    }

    .fb-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 28px 80px;
    }

    /* ── Header ── */
    .fb-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .fb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,23,42,0.70);
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .fb-back:hover {
      background: rgba(37,99,235,0.25);
      border-color: rgba(59,130,246,0.45);
      color: #e2e8f0;
    }
    .fb-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #f1f5f9;
      margin: 0;
      letter-spacing: -0.3px;
    }

    /* ── Submit card ── */
    .fb-submit-card {
      background: rgba(10,18,40,0.75);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 24px 26px;
      margin-bottom: 28px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .fb-submit-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #e2e8f0;
      margin: 0 0 12px;
    }
    #fbTextarea {
      width: 100%;
      min-height: 120px;
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14.5px;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      resize: vertical;
      background: rgba(5,12,28,0.85);
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #fbTextarea::placeholder { color: #334155; }
    #fbTextarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .fb-submit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    #fbSubmitBtn {
      padding: 10px 26px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(37,99,235,0.35);
      transition: opacity 0.2s, transform 0.15s;
    }
    #fbSubmitBtn:hover { opacity: 0.88; transform: translateY(-1px); }
    #fbSubmitBtn:active { transform: translateY(0); }
    #fbSubmitBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .fb-char-count {
      font-size: 12px;
      color: #475569;
      margin-left: auto;
    }
    .fb-char-count.warn { color: #f87171; }
    #fbStatus {
      font-size: 13px;
      font-weight: 600;
      min-height: 18px;
    }
    #fbStatus.ok  { color: #4ade80; }
    #fbStatus.err { color: #f87171; }

    /* ── Feed ── */
    .fb-feed-title {
      font-size: 11.5px;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.6px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .fb-empty {
      text-align: center;
      color: #475569;
      font-size: 14px;
      padding: 40px 0;
    }
    .fb-item {
      background: rgba(10,18,40,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 12px;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fbIn 0.25s ease;
    }
    @keyframes fbIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fb-item-text {
      font-size: 14.5px;
      color: #e2e8f0;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0 0 8px;
    }
    .fb-item-meta {
      font-size: 11.5px;
      color: #475569;
    }
    .fb-item-meta strong { color: #60a5fa; }
    .fb-delete {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #334155;
      font-size: 15px;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .fb-delete:hover { color: #f87171; background: rgba(239,68,68,0.12); }
  </style>
</head>
<body>
  <div class="fb-container">

    <div class="fb-header">
      <a href="dashboard.html" class="fb-back">← Back</a>
      <h1 class="fb-title">💬 Team Suggestions</h1>
    </div>

    <!-- Submit form -->
    <div class="fb-submit-card">
      <h2>Share an idea or suggestion</h2>
      <textarea id="fbTextarea" maxlength="1000"
        placeholder="E.g. Add troubleshooting steps for condenser fan noise on MSF series..."></textarea>
      <div class="fb-submit-row">
        <button id="fbSubmitBtn" onclick="submitFeedback()">Submit</button>
        <span id="fbStatus"></span>
        <span class="fb-char-count" id="fbCharCount">0 / 1000</span>
      </div>
    </div>

    <!-- Feed -->
    <div class="fb-feed-title">ALL SUGGESTIONS</div>
    <div id="fbFeed"><div class="fb-empty">Loading...</div></div>

  </div>

  <script>
  let isAdmin = false;

  // ── Check auth ───────────────────────────────────────────────────────────────
  (async function () {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) { window.location.href = '/'; return; }
      const { role } = await res.json();
      isAdmin = (role === 'superAdmin' || role === 'normalAdmin');
    } catch { window.location.href = '/'; }
    loadFeed();
  })();

  // ── Char counter ─────────────────────────────────────────────────────────────
  document.getElementById('fbTextarea').addEventListener('input', function () {
    const n = this.value.length;
    const el = document.getElementById('fbCharCount');
    el.textContent = `${n} / 1000`;
    el.classList.toggle('warn', n > 900);
  });

  // ── Load feed ────────────────────────────────────────────────────────────────
  async function loadFeed() {
    const feed = document.getElementById('fbFeed');
    try {
      const res  = await fetch('/api/feedback');
      const data = await res.json();
      renderFeed(data);
    } catch {
      feed.innerHTML = '<div class="fb-empty">Failed to load suggestions.</div>';
    }
  }

  function renderFeed(data) {
    const feed = document.getElementById('fbFeed');
    if (!data.length) {
      feed.innerHTML = '<div class="fb-empty">No suggestions yet — be the first! 👆</div>';
      return;
    }
    feed.innerHTML = data.map(item => `
      <div class="fb-item" id="fb-${item.id}">
        <p class="fb-item-text">${escHtml(item.text)}</p>
        <span class="fb-item-meta">
          <strong>${escHtml(item.author)}</strong> &nbsp;·&nbsp; ${formatTs(item.ts)}
        </span>
        ${isAdmin
          ? `<button class="fb-delete" onclick="deleteFeedback('${item.id}')" title="Delete">✕</button>`
          : ''}
      </div>
    `).join('');
  }

  // ── Submit ───────────────────────────────────────────────────────────────────
  async function submitFeedback() {
    const ta  = document.getElementById('fbTextarea');
    const btn = document.getElementById('fbSubmitBtn');
    const st  = document.getElementById('fbStatus');
    const text = ta.value.trim();
    if (!text) { setStatus('Please enter some text.', 'err'); return; }

    btn.disabled = true;
    setStatus('', '');
    try {
      const res  = await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error('Failed');
      const item = await res.json();
      ta.value = '';
      document.getElementById('fbCharCount').textContent = '0 / 1000';
      setStatus('✅ Submitted!', 'ok');
      setTimeout(() => setStatus('', ''), 3000);

      // Prepend new item to feed without reloading
      const feed = document.getElementById('fbFeed');
      const emptyEl = feed.querySelector('.fb-empty');
      if (emptyEl) emptyEl.remove();
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="fb-item" id="fb-${item.id}">
          <p class="fb-item-text">${escHtml(item.text)}</p>
          <span class="fb-item-meta">
            <strong>${escHtml(item.author)}</strong> &nbsp;·&nbsp; ${formatTs(item.ts)}
          </span>
          ${isAdmin
            ? `<button class="fb-delete" onclick="deleteFeedback('${item.id}')" title="Delete">✕</button>`
            : ''}
        </div>`;
      feed.prepend(div.firstElementChild);
    } catch {
      setStatus('❌ Submit failed. Try again.', 'err');
    }
    btn.disabled = false;
  }

  // ── Delete ───────────────────────────────────────────────────────────────────
  async function deleteFeedback(id) {
    if (!confirm('Delete this suggestion?')) return;
    try {
      const res = await fetch(`/api/feedback/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      const el = document.getElementById(`fb-${id}`);
      if (el) {
        el.style.opacity = '0';
        el.style.transform = 'translateX(20px)';
        el.style.transition = 'all 0.2s';
        setTimeout(() => el.remove(), 220);
      }
    } catch { alert('Delete failed.'); }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function setStatus(msg, cls) {
    const el = document.getElementById('fbStatus');
    el.textContent = msg;
    el.className = cls ? `fb-status ${cls}` : '';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTs(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
         + ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  // ── Submit on Ctrl+Enter ─────────────────────────────────────────────────────
  document.getElementById('fbTextarea').addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitFeedback();
  });
  </script>
</body>
</html>
