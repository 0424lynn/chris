<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #0f172a; }

    /* ── Top bar ── */
    .topbar {
      height: 44px; background: #1e293b; display: flex; align-items: center;
      gap: 12px; padding: 0 16px; flex-shrink: 0; border-bottom: 1px solid #334155;
    }
    .topbar-back {
      color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 600;
      padding: 5px 10px; border-radius: 5px; border: 1px solid #334155;
      transition: all .12s; white-space: nowrap;
    }
    .topbar-back:hover { background: #334155; color: white; }
    .topbar-title { color: #e2e8f0; font-size: 14px; font-weight: 600; }
    .topbar-hint  { color: #475569; font-size: 11px; margin-left: auto; }

    /* ── Iframe wrapper ── */
    .iframe-wrap {
      width: 100%; height: calc(100vh - 44px);
      display: flex; align-items: center; justify-content: center;
    }
    iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ── Loading state ── */
    .loading {
      color: #64748b; font-size: 15px; text-align: center;
    }
    .loading::after {
      content: ''; display: block; width: 36px; height: 36px; margin: 16px auto 0;
      border: 3px solid #334155; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ── */
    .error-box {
      background: #1e293b; border: 1px solid #ef4444; border-radius: 12px;
      padding: 28px 36px; text-align: center; max-width: 480px;
    }
    .error-box h2 { color: #f87171; margin-bottom: 10px; }
    .error-box p  { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .error-box a  { color: #60a5fa; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="topbar-back">← Back</a>
  <span class="topbar-title" id="appTitle">Loading...</span>
  <span class="topbar-hint" id="topbarHint"></span>
</div>

<div class="iframe-wrap" id="iframeWrap">
  <div class="loading" id="loadingMsg">Loading app...</div>
</div>

<script>
(async function () {
  const params  = new URLSearchParams(location.search);
  const appName = params.get('app');

  if (!appName) {
    showError('No app specified.', '');
    return;
  }

  // Check auth
  try {
    const me = await fetch('/api/me');
    if (!me.ok) { window.location.href = '/'; return; }
    const { role } = await me.json();
    if (role !== 'superAdmin' && role !== 'normalAdmin') {
      window.location.href = '/dashboard.html';
      return;
    }
  } catch { window.location.href = '/'; return; }

  // Get URL from server (never exposed in frontend)
  try {
    const r = await fetch('/api/app-url/' + encodeURIComponent(appName));
    if (!r.ok) { showError('App not found.', ''); return; }
    const { url, label } = await r.json();

    document.getElementById('appTitle').textContent = label;
    document.title = label + ' — ATOSA TDC';

    const wrap = document.getElementById('iframeWrap');
    wrap.innerHTML = `<iframe src="${url}" title="${label}" allow="fullscreen" loading="lazy"></iframe>`;
  } catch (e) {
    showError('Failed to load app.', e.message);
  }
})();

function showError(title, detail) {
  document.getElementById('appTitle').textContent = 'Error';
  document.getElementById('iframeWrap').innerHTML = `
    <div class="error-box">
      <h2>⚠ ${title}</h2>
      <p>${detail || 'Please go back and try again.'}</p>
      <p style="margin-top:14px"><a href="dashboard.html">← Back to Dashboard</a></p>
    </div>`;
}
</script>
</body>
</html>
